name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ${{ vars.PRODUCTION_DEPLOY_PATH || secrets.PRODUCTION_DEPLOY_PATH || secrets.DEPLOY_PATH }}
      API_HEALTH_URL: ${{ vars.PRODUCTION_API_HEALTH_URL || secrets.PRODUCTION_API_HEALTH_URL }}
      REPO_URL: ${{ vars.PRODUCTION_REPO_URL || secrets.PRODUCTION_REPO_URL || format('{0}/{1}.git', github.server_url, github.repository) }}
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    environment:
      name: production
      url: ${{ vars.PRODUCTION_APP_URL }}
    steps:
      - name: Resolve deployment metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "branch=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate deploy configuration
        run: |
          test -n "${{ secrets.DEPLOY_HOST }}" || { echo "::error::Missing secret DEPLOY_HOST"; exit 1; }
          test -n "${{ secrets.DEPLOY_USER }}" || { echo "::error::Missing secret DEPLOY_USER"; exit 1; }
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" || { echo "::error::Missing secret DEPLOY_SSH_KEY"; exit 1; }
          test -n "${DEPLOY_PATH}" || { echo "::error::Missing deploy path. Set vars.PRODUCTION_DEPLOY_PATH or secrets.DEPLOY_PATH"; exit 1; }
          test -n "${API_HEALTH_URL}" || { echo "::error::Missing PRODUCTION_API_HEALTH_URL"; exit 1; }
          test -n "${REPO_URL}" || { echo "::error::Missing repository URL"; exit 1; }

      - name: Create .env on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BLOCKCHAIN_PRIVATE_KEY: ${{ secrets.BLOCKCHAIN_PRIVATE_KEY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          script_stop: true
          envs: DEPLOY_PATH,POSTGRES_PASSWORD,REDIS_PASSWORD,MONGO_PASSWORD,JWT_SECRET,JWT_REFRESH_SECRET,SENDGRID_API_KEY,STRIPE_SECRET_KEY,OPENAI_API_KEY,BLOCKCHAIN_PRIVATE_KEY
          script: |
            set -Eeuo pipefail

            mkdir -p "${DEPLOY_PATH}"

            cat <<EOF > "${DEPLOY_PATH}/.env"
            NODE_ENV=production
            PORT=3001

            POSTGRES_USER=crm_user
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=crm_db

            REDIS_PASSWORD=${REDIS_PASSWORD}

            MONGO_USER=crm_mongo
            MONGO_PASSWORD=${MONGO_PASSWORD}

            JWT_SECRET=${JWT_SECRET}
            JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}

            SENDGRID_API_KEY=${SENDGRID_API_KEY}

            STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}

            OPENAI_API_KEY=${OPENAI_API_KEY}

            BLOCKCHAIN_PRIVATE_KEY=${BLOCKCHAIN_PRIVATE_KEY}
            EOF

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_SHA: ${{ steps.meta.outputs.sha }}
          DEPLOY_BRANCH: ${{ steps.meta.outputs.branch }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          API_HEALTH_URL: ${{ env.API_HEALTH_URL }}
          REPO_URL: ${{ env.REPO_URL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          script_stop: true
          command_timeout: 30m
          envs: DEPLOY_SHA,DEPLOY_BRANCH,DEPLOY_PATH,API_HEALTH_URL,REPO_URL
          script: |
            set -Eeuo pipefail

            on_error() {
              echo "[ERROR] Deployment failed on line $1"
              if [ -f "${DEPLOY_PATH}/docker-compose.prod.yml" ]; then
                docker compose --env-file "${DEPLOY_PATH}/.env" -f "${DEPLOY_PATH}/docker-compose.prod.yml" ps || true
                docker compose --env-file "${DEPLOY_PATH}/.env" -f "${DEPLOY_PATH}/docker-compose.prod.yml" logs --tail=100 api web nginx || true
              fi
            }

            trap 'on_error $LINENO' ERR

            : "${DEPLOY_SHA:?DEPLOY_SHA is required}"
            : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
            : "${API_HEALTH_URL:?API_HEALTH_URL is required}"
            : "${REPO_URL:?REPO_URL is required}"

            COMPOSE_FILE="${DEPLOY_PATH}/docker-compose.prod.yml"
            ENV_FILE="${DEPLOY_PATH}/.env"
            PARENT_DIR="$(dirname "${DEPLOY_PATH}")"

            echo "[INFO] Starting deploy for ${DEPLOY_BRANCH} @ ${DEPLOY_SHA}"
            mkdir -p "${PARENT_DIR}"

            if [ ! -d "${DEPLOY_PATH}/.git" ]; then
              mkdir -p "${DEPLOY_PATH}"

              if [ -n "$(find "${DEPLOY_PATH}" -mindepth 1 -maxdepth 1 -print -quit 2>/dev/null)" ]; then
                echo "[ERROR] ${DEPLOY_PATH} exists but is not a git repository. Refusing to overwrite existing files."
                exit 1
              fi

              echo "[INFO] Repository not found. Cloning ${REPO_URL} into ${DEPLOY_PATH}"
              git clone --branch "${DEPLOY_BRANCH}" --single-branch "${REPO_URL}" "${DEPLOY_PATH}"
            fi

            cd "${DEPLOY_PATH}"

            if [ ! -f "${ENV_FILE}" ]; then
              echo "[ERROR] Missing ${ENV_FILE}. docker-compose.prod.yml requires root-level environment variables."
              exit 1
            fi

            git fetch --prune origin
            git checkout "${DEPLOY_BRANCH}" || true
            git pull --ff-only origin "${DEPLOY_BRANCH}"
            git checkout --force "${DEPLOY_SHA}"

            echo "[INFO] Stopping old containers..."
            docker compose --env-file "${ENV_FILE}" -f "${COMPOSE_FILE}" down --remove-orphans || true

            echo "[INFO] Cleaning known container conflicts..."
            docker rm -f crm_api crm_web crm_nginx crm_postgres crm_redis crm_mongodb crm_certbot 2>/dev/null || true

            echo "[INFO] Building and starting containers"
            docker compose --env-file "${ENV_FILE}" -f "${COMPOSE_FILE}" build --pull api web
            docker compose --env-file "${ENV_FILE}" -f "${COMPOSE_FILE}" up -d postgres redis mongodb api web nginx

            echo "[INFO] Waiting for API health check"
            for attempt in $(seq 1 24); do
              if curl --fail --silent "${API_HEALTH_URL}" > /dev/null; then
                echo "[INFO] API is healthy"
                break
              fi

              if [ "${attempt}" -eq 24 ]; then
                echo "[ERROR] API health check did not pass in time"
                exit 1
              fi

              sleep 5
            done

            echo "[INFO] Deployment complete"
            docker compose --env-file "${ENV_FILE}" -f "${COMPOSE_FILE}" ps
