version: '3.9'

services:
  # ── Infrastructure ─────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: strongpassword123
      POSTGRES_DB: crm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm_internal

  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - crm_internal

  mongodb:
    image: mongo:7-jammy
    container_name: crm_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: crm_mongo
      MONGO_INITDB_ROOT_PASSWORD: strongpassword123
    volumes:
      - mongo_data:/data/db
    networks:
      - crm_internal

  # ── Backend API ───────────────────────────────────────────

  api:
    build:
      context: ./crm-backend
    container_name: crm_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3001
      API_VERSION: v1
    depends_on:
      - postgres
      - redis
      - mongodb
    networks:
      - crm_internal
      - crm_public

  # ── Frontend ───────────────────────────────────────────────

  web:
    build:
      context: ./crm-frontend
      args:
        NEXT_PUBLIC_API_URL: http://178.104.44.254:3001
        NEXT_PUBLIC_APP_URL: http://178.104.44.254:3000
    container_name: crm_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - api
    networks:
      - crm_public

# ── Volumes ────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  mongo_data:

# ── Networks ───────────────────────────────────────────────

networks:
  crm_internal:
    internal: true
  crm_public: